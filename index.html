<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFETELEGRAMİN</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            position:relative;
            display:inline-block;
        }

        .container img{
            width:100%;
            max-width:600px;
            border-radius:12px;
            display:block;
        }

        .logo{
            position:absolute;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            color:#fff;
            text-decoration:none;
            font-size:34px;
            font-weight:bold;
            letter-spacing:2px;
            text-shadow:0 0 12px rgba(0,0,0,.9);
            transition:.3s;
        }

        .logo:hover{
            color:#00c3ff;
            text-shadow:0 0 15px #00c3ff;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://resmim.net/cdn/2026/07/20/EDiB8G.jpg" alt="SAFETELEGRAMİN">

    <a class="logo"
       href="https://t.me/safetgx"
       target="_blank">
       SAFETELEGRAMİN
    </a>
</div>

</body>
</html>
